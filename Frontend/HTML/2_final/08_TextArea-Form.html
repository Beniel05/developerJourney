<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Area in Form</title>
</head>
<body>
    
    <h1>Text Area in Form</h1>

    <form action="redirected">

        <label for="review1">Leave your review!</label>
        <br>
        <textarea name="review" id="review" rows="10" cols="100" placeholder="Type something here!..."></textarea>
        <!--
            rows -> initial vertical spaces when the page gets loaded (will gets expanded and gets a scroll bar)
            cols -> initial horizontal spaces when the page gets loaded
        -->

        <button type="submit">Submit</button>

    </form>

</body>
</html>
