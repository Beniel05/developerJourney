<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Range and Textarea</title>
</head>
<body>
    
    <h1>Range, Number Type with (min, max, step and value) in Forms</h1>

    <form action="redirected">

        <h2>Range (Slider)</h2>

        <label for="volume">Slide the bar to your desired level</label>
        <input type="range" name="sound-level" id="volume" min="0" max="100" step="1" value="25">
        <!--
            type -> range (slider)
            name -> when submitting the form (URL: /redirected? sound-level="[anything between 0 to 100 - User Input]")
            id -> used for label connection
            min -> starting value
            max -> maximum value
            step -> increase / decrease by (while drag and sliding)
            value -> the default value when the page gets loaded (initial value)
        -->

        <hr>

        <h2>Number type with (min, max, step, value)</h2>

        <label for="number">Enter a number between 1 to 11 (Step Value is 2)</label>
        <input type="number" name="num" id="number" min="1" max="11" step="2" value="1">

        <hr>


        <button type="submit">Submit</button>

    </form>

</body>
</html>
