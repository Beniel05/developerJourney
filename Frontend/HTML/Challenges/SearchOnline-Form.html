<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Online</title>
</head>
<body>
    
    <h1>Search Online Form</h1>

    <h2>Reddit Search</h2>
    <form action="https://www.reddit.com/search/">

        <!-- https://www.reddit.com/search/?q=tennis -->
        
        <label for="reddit">Enter your REDDIT Search Query</label>
        <input type="text" name="q" id="reddit" placeholder="eg: HTML">
        <button type="submit">Search Reddit</button>
        
    </form>
    
    <h2>Google Search</h2>
    
    <form action="https://www.google.com/search">
        
        <!-- https://www.google.com/search?q=cricket -->
        
        <label for="google">Enter your GOOGLE Search Query</label>
        <input type="text" name="q" id="google" placeholder="eg. CSS">
        <button type="submit">Search Google</button>
        
    </form>

    <h2>Youtube Search</h2>
    
    <form action="https://www.youtube.com/results">

        <!-- https://www.youtube.com/results?search_query=oop -->

        <label for="youtube">Enter your YOUTUBE Search Query</label>
        <input type="text" name="search_query" id="youtube" placeholder="eg: JS">
        <button type="submit">Search Youtube</button>

    </form>

    <hr>

    <p><strong>NOTE:</strong> You can also search by typing the Query and clicking 'Return' / 'Enter' Keyboard button</p>

</body>
</html>
