<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superscript and Subscript</title>
</head>
<body>
    
    <h2>--- Superscript</h2>
    <h3>a <sup>2</sup> + b <sup>2</sup> = c <sup>2</sup></h3>
    <h3>a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup></h3>

    <hr />

    <h2>--- Subscript</h2>
    <h3>H <sub>2</sub> O</h3>
    <h3>H<sub>2</sub>O</h3>

    <h3><sup>1</sup>/<sub>2</sub> = 0.5</h3>

</body>
</html>
