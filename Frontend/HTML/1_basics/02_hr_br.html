<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hr and br tags</title>
</head>
<body>
    
    <h2>--- hr stands for Horizontal Rule</h2>
    <p>The below line</p>
    <hr />

    <h2>--- br stands for Break (Line break)</h2>
    <p>
        The world retreats, the noise grows still, <br />
        A gentle peace begins to fill. <br />
        Alone, the mind finds space to breathe, <br />
        As heavy thoughts at last unweave.
    </p>

    <p>
        --- 
        Without br tag
        will not work
        with return key
    </p>

</body>
</html>
